<!DOCTYPE html>
<html lang="en">
<head>
  <title>Order - Sipology</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="margin: 0; font-family: Arial, sans-serif;">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top" style="background-color:#3e2c1c;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="home.html">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/coffee.png" alt="logo" style="height:32px; margin-right: 8px;">
      Sipology
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon bg-light"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="services.html">Services</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="contacts.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
<!-- Order Section -->
<section style="background-color: #fff7f0; padding: 60px 0;">
  <div class="container">
    <h2 class="text-center mb-5" style="color: #6f4e37; font-weight: bold;">Our Special Coffees</h2>

    <!-- Carousel -->
    <div id="coffeeCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner">

        <div class="carousel-item active">
          <div class="row justify-content-center">
            <div class="col-md-4">
              <div class="card" style="border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
                <img src="images/espresso.jpg" class="card-img-top" alt="Espresso">
                <div class="card-body" style="background-color: #fff3e6;">
                  <h5 class="card-title" style="color: #5a3825;">Brown Sugar Shaken Espresso</h5>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="carousel-item">
          <div class="row justify-content-center">
            <div class="col-md-4">
              <div class="card" style="border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
                <img src="images/cappuccino.jpg" class="card-img-top" alt="Cappuccino">
                <div class="card-body" style="background-color: #fff3e6;">
                  <h5 class="card-title" style="color: #5a3825;">Cinnamon Swirl Cappuccino</h5>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="carousel-item">
          <div class="row justify-content-center">
            <div class="col-md-4">
              <div class="card" style="border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
                <img src="images/caramel.jpg" class="card-img-top" alt="Latte">
                <div class="card-body" style="background-color: #fff3e6;">
                  <h5 class="card-title" style="color: #5a3825;">Caramel Dolce Latte</h5>
                </div>
              </div>
            </div>
          </div>
        </div>


        <div class="carousel-item">
          <div class="row justify-content-center">
            <div class="col-md-4">
              <div class="card" style="border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
                <img src="images/turkish.jpg" class="card-img-top" alt="Cappuccino">
                <div class="card-body" style="background-color: #fff3e6;">
                  <h5 class="card-title" style="color: #5a3825;">Turkish</h5>
                </div>
              </div>
            </div>
          </div>
        </div>
        
      </div>

      <!-- Controls -->
      <button class="carousel-control-prev" type="button" data-bs-target="#coffeeCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true" style="filter: invert(1);"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#coffeeCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true" style="filter: invert(1);"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
