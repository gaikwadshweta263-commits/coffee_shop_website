<!DOCTYPE html>
<html>
<head>
  <title>Sipology Coffee Cafe - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-image: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .login-box {
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .logo-circle {
      width: 100px;
      height: 100px;
      background-color: #6f4e37;
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-circle img {
      width: 60px;
    }

    h2 {
      text-align: center;
      color: #6f4e37;
      margin-bottom: 20px;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #6f4e37;
    }

    .btn-login {
      background-color: #6f4e37;
      color: white;
      width: 100%;
    }

    .captcha-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .captcha {
      font-weight: bold;
      font-size: 20px;
      padding: 5px 10px;
      background: #f1f1f1;
      border: 1px solid #ccc;
      border-radius: 5px;
      user-select: none;
    }
  </style>
</head>
<body>

<div class="login-box">
  <div class="logo-circle">
    <img src="images/logo.png" alt="Cafe Logo">
  </div>
  <h2>Sipology Coffee</h2>

  <form id="login-form">
    <div class="mb-3">
      <input type="text" class="form-control" placeholder="Username" id="username" required>
    </div>
    <div class="mb-3">
      <input type="password" class="form-control" placeholder="Password" id="password" required>
    </div>

    <div class="mb-3 captcha-box">
      <div class="captcha" id="captcha-text"></div>
      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="generateCaptcha()">Refresh</button>
    </div>
    <div class="mb-3">
      <input type="text" class="form-control" placeholder="Enter CAPTCHA" id="captcha-input" required>
    </div>

    <button type="submit" class="btn btn-login">Login</button>
  </form>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
  function generateCaptcha() {
    var characters = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    var captcha = '';
    for (var i = 0; i < 5; i++) {
      captcha += characters.charAt(Math.floor(Math.random() * characters.length));
    }
    document.getElementById('captcha-text').textContent = captcha;
  }

  document.addEventListener('DOMContentLoaded', function () {
    generateCaptcha();

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var enteredCaptcha = document.getElementById('captcha-input').value.trim();
      var actualCaptcha = document.getElementById('captcha-text').textContent.trim();

      if (enteredCaptcha === actualCaptcha) {
        // Redirect to home.html on success
        window.location.href = "home.html";
      } else {
        alert('Incorrect CAPTCHA. Please try again.');
        generateCaptcha();
        document.getElementById('captcha-input').value = '';
      }
    });
  });
</script>

</body>
</html>
